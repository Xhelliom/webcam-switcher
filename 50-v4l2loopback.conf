# /etc/modprobe.d/v4l2loopback.conf
# exclusive_caps=1 : le loopback n'annonce la capacité CAPTURE que lorsqu'un
#   producteur streame → indispensable pour que Chrome/PipeWire l'énumèrent comme
#   webcam (sinon il expose aussi VIDEO_OUTPUT et il est ignoré).
# card_label : nom affiché dans le sélecteur de caméra.
options v4l2loopback exclusive_caps=1 card_label="Camera intégrée"
