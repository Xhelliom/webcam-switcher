# /etc/modprobe.d/v4l2loopback.conf
# exclusive_caps=1 : the loopback only advertises the CAPTURE capability while a
#   producer is streaming -> required so Chrome/PipeWire enumerate it as a webcam
#   (otherwise it also advertises VIDEO_OUTPUT and gets skipped).
# card_label : name shown in the camera picker.
options v4l2loopback exclusive_caps=1 card_label="Camera intégrée"
